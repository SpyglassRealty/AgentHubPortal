<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spyglass Realty — Agent Onboarding Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwindcss.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a5f' },
            spyglass: { DEFAULT: '#1e3a5f', light: '#2d5a8e' },
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .check-animate { animation: checkPop 0.3s ease-out; }
    @keyframes checkPop { 0% { transform: scale(0.8); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    .progress-fill { transition: width 0.5s ease-out; }
    @media print {
      .no-print { display: none !important; }
      .print-break { page-break-before: always; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="app"></div>

  <script>
    // ── Data Model ──────────────────────────────────
    const ONBOARDING_PHASES = [
      {
        id: 'pre-join',
        name: 'Pre-Join',
        icon: '📋',
        color: 'blue',
        description: 'Before they sign — set the stage',
        tasks: [
          { id: 'pj-1', text: 'Send welcome packet (split structure, tech overview, value props)', owner: 'recruiting', priority: 'critical', daysFromStart: -7 },
          { id: 'pj-2', text: 'Collect signed ICA (Independent Contractor Agreement)', owner: 'admin', priority: 'critical', daysFromStart: -3 },
          { id: 'pj-3', text: 'Verify active TREC license & E&O insurance', owner: 'admin', priority: 'critical', daysFromStart: -3 },
          { id: 'pj-4', text: 'Run background check', owner: 'admin', priority: 'critical', daysFromStart: -3 },
          { id: 'pj-5', text: 'Process TREC sponsorship transfer', owner: 'admin', priority: 'critical', daysFromStart: -2 },
          { id: 'pj-6', text: 'Set up ReZen account & profile', owner: 'ops', priority: 'high', daysFromStart: -1 },
          { id: 'pj-7', text: 'Create agent profile on spyglassrealty.com', owner: 'marketing', priority: 'high', daysFromStart: -1 },
          { id: 'pj-8', text: 'Order business cards & signage', owner: 'marketing', priority: 'medium', daysFromStart: -1 },
          { id: 'pj-9', text: 'Pre-assign mentor/buddy based on specialty', owner: 'leadership', priority: 'high', daysFromStart: -1 },
        ]
      },
      {
        id: 'day-one',
        name: 'Day One',
        icon: '🎯',
        color: 'green',
        description: 'Make an incredible first impression',
        tasks: [
          { id: 'd1-1', text: 'Welcome call/meeting with leadership', owner: 'leadership', priority: 'critical', daysFromStart: 0 },
          { id: 'd1-2', text: 'Send welcome announcement to team Slack', owner: 'marketing', priority: 'high', daysFromStart: 0 },
          { id: 'd1-3', text: 'Activate all tech accounts (email, CRM, kvCORE, Canva, etc.)', owner: 'ops', priority: 'critical', daysFromStart: 0 },
          { id: 'd1-4', text: 'Mission Control access + dashboard walkthrough', owner: 'ops', priority: 'high', daysFromStart: 0 },
          { id: 'd1-5', text: 'CMA tool training (how to pull comps & build presentations)', owner: 'training', priority: 'high', daysFromStart: 0 },
          { id: 'd1-6', text: 'Share Spyglass marketing asset library access', owner: 'marketing', priority: 'medium', daysFromStart: 0 },
          { id: 'd1-7', text: 'Add to all relevant Slack channels', owner: 'ops', priority: 'high', daysFromStart: 0 },
          { id: 'd1-8', text: 'Share listing & transaction checklists', owner: 'admin', priority: 'high', daysFromStart: 0 },
        ]
      },
      {
        id: 'week-one',
        name: 'Week One',
        icon: '🚀',
        color: 'purple',
        description: 'Build momentum and confidence',
        tasks: [
          { id: 'w1-1', text: 'Mentor intro meeting (30 min)', owner: 'leadership', priority: 'critical', daysFromStart: 1 },
          { id: 'w1-2', text: 'Pulse (market intelligence) deep dive training', owner: 'training', priority: 'high', daysFromStart: 2 },
          { id: 'w1-3', text: 'Transaction process walkthrough (ReZen → closing)', owner: 'admin', priority: 'critical', daysFromStart: 2 },
          { id: 'w1-4', text: 'Social media brand kit delivery + content calendar', owner: 'marketing', priority: 'medium', daysFromStart: 3 },
          { id: 'w1-5', text: 'Lead gen strategy session (sphere, farming, digital)', owner: 'training', priority: 'high', daysFromStart: 3 },
          { id: 'w1-6', text: 'First team meeting attendance', owner: 'leadership', priority: 'high', daysFromStart: 5 },
          { id: 'w1-7', text: 'Headshot/photo session scheduled', owner: 'marketing', priority: 'medium', daysFromStart: 5 },
          { id: 'w1-8', text: 'Revenue share program explanation & strategy', owner: 'leadership', priority: 'high', daysFromStart: 4 },
          { id: 'w1-9', text: 'Set first 90-day production goals', owner: 'leadership', priority: 'critical', daysFromStart: 5 },
        ]
      },
      {
        id: 'month-one',
        name: 'First 30 Days',
        icon: '📈',
        color: 'amber',
        description: 'Establish rhythm and first wins',
        tasks: [
          { id: 'm1-1', text: 'Weekly 1:1 with mentor (check-in #1)', owner: 'leadership', priority: 'high', daysFromStart: 7 },
          { id: 'm1-2', text: 'Complete Spyglass onboarding training modules', owner: 'training', priority: 'critical', daysFromStart: 14 },
          { id: 'm1-3', text: 'Database import & sphere campaign launch', owner: 'ops', priority: 'high', daysFromStart: 10 },
          { id: 'm1-4', text: 'First listing/buyer presentation review with mentor', owner: 'leadership', priority: 'high', daysFromStart: 14 },
          { id: 'm1-5', text: 'Tech stack proficiency check (CRM, CMA, Mission Control)', owner: 'ops', priority: 'high', daysFromStart: 21 },
          { id: 'm1-6', text: 'Weekly 1:1 with mentor (check-in #2)', owner: 'leadership', priority: 'high', daysFromStart: 14 },
          { id: 'm1-7', text: 'Pipeline review: active leads, pending, prospects', owner: 'leadership', priority: 'critical', daysFromStart: 21 },
          { id: 'm1-8', text: 'First Pulse market report to past client', owner: 'training', priority: 'medium', daysFromStart: 21 },
          { id: 'm1-9', text: '30-day check-in with leadership', owner: 'leadership', priority: 'critical', daysFromStart: 30 },
        ]
      },
      {
        id: 'quarter-one',
        name: 'First 90 Days',
        icon: '🏆',
        color: 'red',
        description: 'Locked in and producing',
        tasks: [
          { id: 'q1-1', text: '60-day production review', owner: 'leadership', priority: 'critical', daysFromStart: 60 },
          { id: 'q1-2', text: 'Referral network building plan review', owner: 'leadership', priority: 'high', daysFromStart: 45 },
          { id: 'q1-3', text: 'Marketing ROI check — what\'s working?', owner: 'marketing', priority: 'high', daysFromStart: 60 },
          { id: 'q1-4', text: 'Revenue share: first referral strategy check', owner: 'leadership', priority: 'medium', daysFromStart: 60 },
          { id: 'q1-5', text: '90-day formal review & next quarter goal setting', owner: 'leadership', priority: 'critical', daysFromStart: 90 },
          { id: 'q1-6', text: 'Collect testimonial/review for recruiting use', owner: 'marketing', priority: 'medium', daysFromStart: 75 },
          { id: 'q1-7', text: 'Identify specialization opportunities (luxury, relocation, investment, etc.)', owner: 'leadership', priority: 'high', daysFromStart: 75 },
          { id: 'q1-8', text: 'Graduate from onboarding to standard support cadence', owner: 'leadership', priority: 'critical', daysFromStart: 90 },
        ]
      }
    ];

    const OWNER_LABELS = {
      admin: { label: 'Admin', color: 'bg-slate-100 text-slate-700', icon: '📄' },
      ops: { label: 'Operations', color: 'bg-blue-100 text-blue-700', icon: '⚙️' },
      marketing: { label: 'Marketing', color: 'bg-pink-100 text-pink-700', icon: '🎨' },
      leadership: { label: 'Leadership', color: 'bg-purple-100 text-purple-700', icon: '👔' },
      training: { label: 'Training', color: 'bg-green-100 text-green-700', icon: '📚' },
      recruiting: { label: 'Recruiting', color: 'bg-amber-100 text-amber-700', icon: '🎯' },
    };

    const PRIORITY_BADGES = {
      critical: { label: 'Critical', color: 'bg-red-100 text-red-700 border-red-200' },
      high: { label: 'High', color: 'bg-amber-100 text-amber-700 border-amber-200' },
      medium: { label: 'Medium', color: 'bg-blue-100 text-blue-700 border-blue-200' },
      low: { label: 'Low', color: 'bg-slate-100 text-slate-700 border-slate-200' },
    };

    const COLOR_MAP = {
      blue: { bg: 'bg-blue-500', light: 'bg-blue-50', border: 'border-blue-500', text: 'text-blue-700' },
      green: { bg: 'bg-green-500', light: 'bg-green-50', border: 'border-green-500', text: 'text-green-700' },
      purple: { bg: 'bg-purple-500', light: 'bg-purple-50', border: 'border-purple-500', text: 'text-purple-700' },
      amber: { bg: 'bg-amber-500', light: 'bg-amber-50', border: 'border-amber-500', text: 'text-amber-700' },
      red: { bg: 'bg-red-500', light: 'bg-red-50', border: 'border-red-500', text: 'text-red-700' },
    };

    // ── State Management ────────────────────────────
    let state = {
      agentName: '',
      startDate: new Date().toISOString().split('T')[0],
      completedTasks: new Set(),
      notes: {},
      activePhase: 'pre-join',
      filterOwner: 'all',
      filterPriority: 'all',
      viewMode: 'checklist', // 'checklist' | 'timeline' | 'by-owner'
    };

    // Load from localStorage
    function loadState() {
      try {
        const saved = localStorage.getItem('spyglass-onboarding');
        if (saved) {
          const parsed = JSON.parse(saved);
          state = {
            ...state,
            ...parsed,
            completedTasks: new Set(parsed.completedTasks || []),
            notes: parsed.notes || {},
          };
        }
      } catch (e) { /* ignore */ }
    }

    function saveState() {
      try {
        localStorage.setItem('spyglass-onboarding', JSON.stringify({
          ...state,
          completedTasks: [...state.completedTasks],
        }));
      } catch (e) { /* ignore */ }
    }

    // ── Rendering ───────────────────────────────────

    function getProgress() {
      const total = ONBOARDING_PHASES.reduce((sum, p) => sum + p.tasks.length, 0);
      const done = state.completedTasks.size;
      return { total, done, pct: total > 0 ? (done / total) * 100 : 0 };
    }

    function getPhaseProgress(phaseId) {
      const phase = ONBOARDING_PHASES.find(p => p.id === phaseId);
      if (!phase) return { total: 0, done: 0, pct: 0 };
      const total = phase.tasks.length;
      const done = phase.tasks.filter(t => state.completedTasks.has(t.id)).length;
      return { total, done, pct: total > 0 ? (done / total) * 100 : 0 };
    }

    function getDueDate(daysFromStart) {
      if (!state.startDate) return '';
      const d = new Date(state.startDate);
      d.setDate(d.getDate() + daysFromStart);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function isOverdue(daysFromStart) {
      if (!state.startDate) return false;
      const d = new Date(state.startDate);
      d.setDate(d.getDate() + daysFromStart);
      return d < new Date() && !state.completedTasks.has;
    }

    function toggleTask(taskId) {
      if (state.completedTasks.has(taskId)) {
        state.completedTasks.delete(taskId);
      } else {
        state.completedTasks.add(taskId);
      }
      saveState();
      render();
    }

    function updateNote(taskId, note) {
      state.notes[taskId] = note;
      saveState();
    }

    function resetAll() {
      if (!confirm('Reset all progress? This cannot be undone.')) return;
      state.completedTasks = new Set();
      state.notes = {};
      state.agentName = '';
      state.startDate = new Date().toISOString().split('T')[0];
      saveState();
      render();
    }

    function exportChecklist() {
      let md = `# Spyglass Realty — Agent Onboarding Checklist\n`;
      md += `**Agent:** ${state.agentName || 'TBD'}\n`;
      md += `**Start Date:** ${state.startDate}\n`;
      md += `**Generated:** ${new Date().toLocaleDateString()}\n\n`;

      const { done, total, pct } = getProgress();
      md += `**Progress:** ${done}/${total} (${pct.toFixed(0)}%)\n\n---\n\n`;

      ONBOARDING_PHASES.forEach(phase => {
        md += `## ${phase.icon} ${phase.name}\n\n`;
        phase.tasks.forEach(task => {
          const checked = state.completedTasks.has(task.id) ? 'x' : ' ';
          const owner = OWNER_LABELS[task.owner]?.label || task.owner;
          const due = getDueDate(task.daysFromStart);
          md += `- [${checked}] **${task.text}** — ${owner} | Due: ${due}\n`;
          if (state.notes[task.id]) {
            md += `  - Note: ${state.notes[task.id]}\n`;
          }
        });
        md += '\n';
      });

      const blob = new Blob([md], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `onboarding-${(state.agentName || 'agent').toLowerCase().replace(/\s+/g, '-')}-${state.startDate}.md`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function renderHeader() {
      const { done, total, pct } = getProgress();
      return `
        <div class="bg-white border-b shadow-sm sticky top-0 z-50 no-print">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
              <div>
                <h1 class="text-2xl font-bold text-gray-900 flex items-center gap-2">
                  🔭 Spyglass Agent Onboarding
                </h1>
                <p class="text-sm text-gray-500 mt-1">Systematic onboarding for scaling to 300 agents</p>
              </div>
              <div class="flex items-center gap-3">
                <button onclick="exportChecklist()" class="px-3 py-1.5 text-sm border rounded-lg hover:bg-gray-50 transition-colors flex items-center gap-1.5">
                  📥 Export
                </button>
                <button onclick="resetAll()" class="px-3 py-1.5 text-sm border border-red-200 text-red-600 rounded-lg hover:bg-red-50 transition-colors flex items-center gap-1.5">
                  🔄 Reset
                </button>
              </div>
            </div>

            <!-- Agent Info Row -->
            <div class="flex flex-col sm:flex-row gap-4 mt-4">
              <div class="flex-1">
                <label class="text-xs font-medium text-gray-500 block mb-1">Agent Name</label>
                <input
                  type="text"
                  value="${state.agentName}"
                  onchange="state.agentName = this.value; saveState();"
                  placeholder="Enter new agent's name..."
                  class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                />
              </div>
              <div class="w-full sm:w-48">
                <label class="text-xs font-medium text-gray-500 block mb-1">Start Date</label>
                <input
                  type="date"
                  value="${state.startDate}"
                  onchange="state.startDate = this.value; saveState(); render();"
                  class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                />
              </div>
            </div>

            <!-- Overall Progress -->
            <div class="mt-4">
              <div class="flex items-center justify-between text-sm mb-1.5">
                <span class="font-medium text-gray-700">${done} of ${total} tasks complete</span>
                <span class="font-bold text-lg ${pct === 100 ? 'text-green-600' : 'text-blue-600'}">${pct.toFixed(0)}%</span>
              </div>
              <div class="h-3 bg-gray-100 rounded-full overflow-hidden">
                <div class="h-full bg-gradient-to-r from-blue-500 to-purple-500 rounded-full progress-fill" style="width: ${pct}%"></div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderPhaseNav() {
      return `
        <div class="bg-white border-b no-print">
          <div class="max-w-7xl mx-auto px-4 sm:px-6">
            <div class="flex overflow-x-auto gap-1 py-2 -mx-1">
              ${ONBOARDING_PHASES.map(phase => {
                const prog = getPhaseProgress(phase.id);
                const isActive = state.activePhase === phase.id;
                const colors = COLOR_MAP[phase.color];
                return `
                  <button
                    onclick="state.activePhase = '${phase.id}'; render();"
                    class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm whitespace-nowrap transition-all ${
                      isActive
                        ? `${colors.light} ${colors.text} ${colors.border} border font-semibold`
                        : 'text-gray-500 hover:bg-gray-50'
                    }"
                  >
                    <span>${phase.icon}</span>
                    <span>${phase.name}</span>
                    <span class="px-1.5 py-0.5 rounded-full text-xs font-medium ${
                      prog.pct === 100 ? 'bg-green-100 text-green-700' :
                      prog.done > 0 ? `${colors.light} ${colors.text}` :
                      'bg-gray-100 text-gray-500'
                    }">
                      ${prog.done}/${prog.total}
                    </span>
                  </button>
                `;
              }).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function renderFilters() {
      return `
        <div class="flex flex-wrap gap-2 mb-4 no-print">
          <div>
            <label class="text-xs font-medium text-gray-500 block mb-1">Owner</label>
            <select
              onchange="state.filterOwner = this.value; render();"
              class="px-3 py-1.5 border rounded-lg text-sm bg-white"
              value="${state.filterOwner}"
            >
              <option value="all" ${state.filterOwner === 'all' ? 'selected' : ''}>All Owners</option>
              ${Object.entries(OWNER_LABELS).map(([key, val]) =>
                `<option value="${key}" ${state.filterOwner === key ? 'selected' : ''}>${val.icon} ${val.label}</option>`
              ).join('')}
            </select>
          </div>
          <div>
            <label class="text-xs font-medium text-gray-500 block mb-1">Priority</label>
            <select
              onchange="state.filterPriority = this.value; render();"
              class="px-3 py-1.5 border rounded-lg text-sm bg-white"
            >
              <option value="all" ${state.filterPriority === 'all' ? 'selected' : ''}>All Priorities</option>
              ${Object.entries(PRIORITY_BADGES).map(([key, val]) =>
                `<option value="${key}" ${state.filterPriority === key ? 'selected' : ''}>${val.label}</option>`
              ).join('')}
            </select>
          </div>
          <div>
            <label class="text-xs font-medium text-gray-500 block mb-1">View</label>
            <div class="flex border rounded-lg overflow-hidden">
              ${['checklist', 'by-owner'].map(mode => `
                <button
                  onclick="state.viewMode = '${mode}'; render();"
                  class="px-3 py-1.5 text-sm ${state.viewMode === mode ? 'bg-blue-500 text-white' : 'bg-white text-gray-600 hover:bg-gray-50'}"
                >
                  ${mode === 'checklist' ? '☑️ Checklist' : '👥 By Owner'}
                </button>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function renderTaskCard(task, phaseColor) {
      const isDone = state.completedTasks.has(task.id);
      const owner = OWNER_LABELS[task.owner] || { label: task.owner, color: 'bg-gray-100 text-gray-700', icon: '❓' };
      const priority = PRIORITY_BADGES[task.priority] || PRIORITY_BADGES.medium;
      const dueDate = getDueDate(task.daysFromStart);
      const today = new Date();
      const dueD = new Date(state.startDate);
      dueD.setDate(dueD.getDate() + task.daysFromStart);
      const isOverdue = !isDone && dueD < today;
      const isDueToday = !isDone && dueD.toDateString() === today.toDateString();
      const note = state.notes[task.id] || '';

      return `
        <div class="group border rounded-lg p-3 transition-all hover:shadow-sm ${
          isDone ? 'bg-gray-50 border-gray-200 opacity-75' :
          isOverdue ? 'bg-red-50 border-red-200' :
          isDueToday ? 'bg-amber-50 border-amber-200' :
          'bg-white border-gray-200'
        } fade-in">
          <div class="flex items-start gap-3">
            <!-- Checkbox -->
            <button
              onclick="toggleTask('${task.id}')"
              class="mt-0.5 flex-shrink-0 w-5 h-5 rounded border-2 flex items-center justify-center transition-all ${
                isDone
                  ? 'bg-green-500 border-green-500 text-white check-animate'
                  : 'border-gray-300 hover:border-blue-500'
              }"
            >
              ${isDone ? '<svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>' : ''}
            </button>

            <!-- Content -->
            <div class="flex-1 min-w-0">
              <div class="flex items-start justify-between gap-2">
                <span class="text-sm ${isDone ? 'line-through text-gray-400' : 'text-gray-900 font-medium'}">${task.text}</span>
                <div class="flex items-center gap-1.5 flex-shrink-0">
                  <span class="text-xs px-1.5 py-0.5 rounded border ${priority.color}">${priority.label}</span>
                </div>
              </div>
              <div class="flex items-center gap-3 mt-1.5 text-xs text-gray-500">
                <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full ${owner.color}">
                  ${owner.icon} ${owner.label}
                </span>
                <span class="inline-flex items-center gap-1 ${isOverdue ? 'text-red-600 font-medium' : isDueToday ? 'text-amber-600 font-medium' : ''}">
                  📅 ${dueDate}
                  ${isOverdue ? ' ⚠️ Overdue' : isDueToday ? ' ⏰ Today' : ''}
                </span>
              </div>
              <!-- Note field (visible on hover or if has content) -->
              <div class="${note ? '' : 'hidden group-hover:block'} mt-2">
                <input
                  type="text"
                  value="${note.replace(/"/g, '&quot;')}"
                  onchange="updateNote('${task.id}', this.value)"
                  placeholder="Add a note..."
                  class="w-full text-xs px-2 py-1 border border-dashed rounded bg-transparent focus:bg-white focus:border-blue-300 outline-none transition-colors"
                />
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderChecklistView() {
      const phase = ONBOARDING_PHASES.find(p => p.id === state.activePhase);
      if (!phase) return '';

      const tasks = phase.tasks.filter(t => {
        if (state.filterOwner !== 'all' && t.owner !== state.filterOwner) return false;
        if (state.filterPriority !== 'all' && t.priority !== state.filterPriority) return false;
        return true;
      });

      const colors = COLOR_MAP[phase.color];
      const prog = getPhaseProgress(phase.id);

      return `
        <div class="max-w-4xl mx-auto">
          <!-- Phase Header -->
          <div class="mb-6">
            <div class="flex items-center gap-3 mb-2">
              <span class="text-3xl">${phase.icon}</span>
              <div>
                <h2 class="text-xl font-bold text-gray-900">${phase.name}</h2>
                <p class="text-sm text-gray-500">${phase.description}</p>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
                <div class="h-full ${colors.bg} rounded-full progress-fill" style="width: ${prog.pct}%"></div>
              </div>
              <span class="text-sm font-medium ${colors.text}">${prog.done}/${prog.total}</span>
            </div>
          </div>

          ${renderFilters()}

          <!-- Tasks -->
          <div class="space-y-2">
            ${tasks.length > 0
              ? tasks.map(t => renderTaskCard(t, phase.color)).join('')
              : '<div class="text-center py-8 text-gray-400">No tasks match the current filters</div>'
            }
          </div>
        </div>
      `;
    }

    function renderByOwnerView() {
      const allTasks = ONBOARDING_PHASES.flatMap(p =>
        p.tasks.map(t => ({ ...t, phaseName: p.name, phaseIcon: p.icon, phaseColor: p.color }))
      );

      const byOwner = {};
      Object.keys(OWNER_LABELS).forEach(key => { byOwner[key] = []; });
      allTasks.forEach(t => {
        if (!byOwner[t.owner]) byOwner[t.owner] = [];
        byOwner[t.owner].push(t);
      });

      return `
        <div class="max-w-5xl mx-auto">
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            ${Object.entries(byOwner).map(([ownerKey, tasks]) => {
              const owner = OWNER_LABELS[ownerKey];
              const done = tasks.filter(t => state.completedTasks.has(t.id)).length;
              const total = tasks.length;
              const pct = total > 0 ? (done / total) * 100 : 0;

              return `
                <div class="border rounded-xl bg-white overflow-hidden">
                  <div class="p-4 border-b ${owner.color}">
                    <div class="flex items-center justify-between">
                      <span class="font-semibold text-sm flex items-center gap-2">${owner.icon} ${owner.label}</span>
                      <span class="text-xs font-medium">${done}/${total}</span>
                    </div>
                    <div class="mt-2 h-1.5 bg-white/40 rounded-full overflow-hidden">
                      <div class="h-full bg-white/80 rounded-full progress-fill" style="width: ${pct}%"></div>
                    </div>
                  </div>
                  <div class="p-3 space-y-2 max-h-96 overflow-y-auto">
                    ${tasks.map(t => {
                      const isDone = state.completedTasks.has(t.id);
                      return `
                        <div class="flex items-start gap-2 text-sm p-2 rounded-lg hover:bg-gray-50">
                          <button
                            onclick="toggleTask('${t.id}')"
                            class="mt-0.5 flex-shrink-0 w-4 h-4 rounded border-2 flex items-center justify-center ${
                              isDone ? 'bg-green-500 border-green-500 text-white' : 'border-gray-300'
                            }"
                          >
                            ${isDone ? '<svg class="w-2.5 h-2.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>' : ''}
                          </button>
                          <div class="flex-1 min-w-0">
                            <span class="${isDone ? 'line-through text-gray-400' : 'text-gray-800'}">${t.text}</span>
                            <div class="text-xs text-gray-400 mt-0.5">${t.phaseIcon} ${t.phaseName} · ${getDueDate(t.daysFromStart)}</div>
                          </div>
                        </div>
                      `;
                    }).join('')}
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    function renderStats() {
      const allTasks = ONBOARDING_PHASES.flatMap(p => p.tasks);
      const overdueTasks = allTasks.filter(t => {
        if (state.completedTasks.has(t.id)) return false;
        const d = new Date(state.startDate);
        d.setDate(d.getDate() + t.daysFromStart);
        return d < new Date();
      });

      const criticalIncomplete = allTasks.filter(t =>
        t.priority === 'critical' && !state.completedTasks.has(t.id)
      );

      if (overdueTasks.length === 0 && criticalIncomplete.length === 0) return '';

      return `
        <div class="max-w-4xl mx-auto mb-6 no-print">
          ${overdueTasks.length > 0 ? `
            <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-3">
              <div class="flex items-center gap-2 text-red-700 font-semibold text-sm mb-2">
                ⚠️ ${overdueTasks.length} Overdue Task${overdueTasks.length > 1 ? 's' : ''}
              </div>
              <div class="space-y-1">
                ${overdueTasks.slice(0, 5).map(t => `
                  <div class="text-sm text-red-600 flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-red-500 flex-shrink-0"></span>
                    ${t.text} (due ${getDueDate(t.daysFromStart)})
                  </div>
                `).join('')}
                ${overdueTasks.length > 5 ? `<div class="text-xs text-red-500 mt-1">+ ${overdueTasks.length - 5} more</div>` : ''}
              </div>
            </div>
          ` : ''}
          ${criticalIncomplete.length > 0 ? `
            <div class="bg-amber-50 border border-amber-200 rounded-lg p-4">
              <div class="flex items-center gap-2 text-amber-700 font-semibold text-sm mb-2">
                🔥 ${criticalIncomplete.length} Critical Task${criticalIncomplete.length > 1 ? 's' : ''} Remaining
              </div>
              <div class="flex flex-wrap gap-2">
                ${criticalIncomplete.slice(0, 6).map(t => `
                  <span class="text-xs bg-amber-100 text-amber-700 px-2 py-1 rounded-full">${t.text.substring(0, 40)}${t.text.length > 40 ? '...' : ''}</span>
                `).join('')}
              </div>
            </div>
          ` : ''}
        </div>
      `;
    }

    function render() {
      const content = state.viewMode === 'by-owner' ? renderByOwnerView() : renderChecklistView();

      document.getElementById('app').innerHTML = `
        ${renderHeader()}
        ${renderPhaseNav()}
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
          ${renderStats()}
          ${content}
        </div>
      `;
    }

    // ── Init ────────────────────────────────────────
    loadState();
    render();
  </script>
</body>
</html>
